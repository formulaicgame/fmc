name: release
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: false
        default: nightly
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: fmc-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            name: fmc-macos-intel
          - target: aarch64-apple-darwin
            os: macos-latest
            name: fmc-macos-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: fmc-windows
            file_extension: .exe
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v7

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          target: ${{ matrix.target }}

      - name: Cache rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            **/target/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu'}}
        run: sudo apt-get update && sudo apt-get install g++ pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0 libwayland-dev libxkbcommon-dev

      - name: Build
        run: cd client && cargo build --release --target ${{ matrix.target }}

      - name: Rename Artifact
        run: cp ./client/target/${{ matrix.target }}/release/client${{ matrix.file_extension }} ${{ matrix.name }}${{ matrix.file_extension }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}${{ matrix.file_extension }}
          retention-days: 1

  package-macos:
    needs: build
    runs-on: macos-latest
    name: Package macOS
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: fmc-macos-intel
          path: macos

      - uses: actions/download-artifact@v8
        with:
          name: fmc-macos-arm
          path: macos

      - name: Create app bundle
        run: |
          APP=dmg/fmc.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          lipo -create -output "$APP/Contents/MacOS/fmc" macos/fmc-macos-intel macos/fmc-macos-arm
          chmod +x "$APP/Contents/MacOS/fmc"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>fmc</string>
            <key>CFBundleDisplayName</key>
            <string>fmc</string>
            <key>CFBundleIdentifier</key>
            <string>gg.fmc.client</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleExecutable</key>
            <string>fmc</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname fmc \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon fmc.app 180 170 \
            --hide-extension fmc.app \
            --app-drop-link 480 170 \
            fmc-macos.dmg \
            dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fmc-macos
          path: fmc-macos.dmg
          retention-days: 1

  publish:
    needs: [build, package-macos]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - run: mkdir artifacts

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Drop per-arch macOS builds
        run: rm -rf artifacts/fmc-macos-intel artifacts/fmc-macos-arm

      - name: Compress Linux and Windows builds
        run: |
          (cd artifacts/fmc-linux && tar -czf fmc-linux.tar.gz fmc-linux && rm fmc-linux)
          (cd artifacts/fmc-windows && zip fmc-windows.zip fmc-windows.exe && rm fmc-windows.exe)

      - if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV

      - if: github.event_name == 'push'
        run: |
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create new release
        run: |
          gh release delete $TAG_NAME --yes --cleanup-tag || true
          gh release create $TAG_NAME --latest ./artifacts/*/*
